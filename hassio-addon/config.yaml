name: "Sprout Track"
description: "Baby activity tracker - self-hosted"
version: "1.3.5"
slug: "sprout_track"
init: false
arch:
  - amd64
  - aarch64
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web UI"
map:
  - share:rw
options:
